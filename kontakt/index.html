<div id="nav-placeholder"></div>
<script>
    fetch('/nav.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('nav-placeholder').innerHTML = html;
            const currentPath = window.location.pathname.toLowerCase();
            document.querySelectorAll('#nav-placeholder nav ul li a').forEach(link => {
                const href = link.getAttribute('href').toLowerCase();
                if (
                    (currentPath.includes('/musik/') && href.includes('musik')) ||
                    (currentPath.includes('/services/') && href.includes('services')) ||
                    (currentPath.includes('/kontakt/') && href.includes('kontakt')) ||
                    (currentPath.includes('/ueber-mich/') && href.includes('ueber-mich'))
                ) {
                    link.classList.add('active');
                }
            });
        });
</script>
<header class="hero-small">
    <h2>Verbessere jetzt deinen Sound!</h2>
    <p>Lass uns an deinem nächsten Projekt arbeiten.</p>
</header>
<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <form action="https://formspree.io/f/mkokevgd" method="POST">
            <input type="hidden" name="_next" value="https://julez166.de/kontakt/">
            <div style="margin-bottom: 20px;">
                <label style="display: block; color: var(--accent); margin-bottom: 5px;">Name</label>
                <input type="text" name="name" placeholder="Dein Name" required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; color: var(--accent); margin-bottom: 5px;">E-Mail</label>
                <input type="email" name="email" placeholder="deine@mail.de" required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; color: var(--accent); margin-bottom: 5px;">Gewünschter Service</label>
                <select name="service" id="serviceField" required style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px;">
                    <option value="" disabled selected hidden>Bitte auswählen...</option>
                    <option value="Feature">Feature</option>
                    <option value="Mix">Mix</option>
                    <option value="Master">Master</option>
                    <option value="Mix & Master">Mix & Master</option>
                    <option value="Erstes Mix & Master (gratis)">Erstes Mix & Master (gratis)</option>
                    <option value="Sonstiges">Sonstiges</option>
                </select>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; color: var(--accent); margin-bottom: 5px;">Deine Nachricht</label>
                <textarea name="message" placeholder="Erzähl mir von deinem Projekt..." required oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; min-height: 120px; resize: none; overflow: hidden;"></textarea>
            </div>
            <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Nachricht senden</button>
        </form>

<script>
    const params = new URLSearchParams(window.location.search);
    const service = params.get('service');
    if (service) {
        const select = document.getElementById('serviceField');
        const options = Array.from(select.options).map(o => o.value);
        if (options.includes(service)) {
            select.value = service;
        } else {
            // Mehrere Services ausgewählt (z.B. "Mix, Master") oder unbekannter Wert:
            // Dropdown auf "Sonstiges" setzen und Auswahl in der Nachricht ergänzen
            select.value = 'Sonstiges';
            const messageField = document.querySelector('textarea[name="message"]');
            if (messageField) {
                messageField.value = `Gewünschte Services: ${service}\n\n`;
            }
        }
    }
</script>
